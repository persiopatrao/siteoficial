<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Usuário - Sistema de Ocorrências</title>
  <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
  <div class="page-container">
    <div class="card form-card">
      <h1>Criar novo usuário</h1>
      <form id="registerForm" class="form">
        <label for="newUsername">Usuário</label>
        <input type="text" id="newUsername" name="username" required>

        <label for="newPassword">Senha</label>
        <input type="password" id="newPassword" name="password" required>

        <label for="newEmpresa">Unidade escolar</label>
        <select id="newEmpresa" name="empresa_id" required>
          <option value="">Selecione sua escola</option>
        </select>

        <button type="submit" class="btn btn-primary">Registrar</button>
      </form>
      <div class="form-footer">
        <a class="link-button" href="/">Voltar ao login</a>
      </div>
      <div id="registerMessage" class="message"></div>
    </div>
  </div>
  <script src="/frontend/js/app.js"></script>
</body>
</html>
