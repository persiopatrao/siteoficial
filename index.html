<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Ocorrências - Login</title>
  <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
  <div class="page-container">
    <div class="card login-card">
      <h1>Sistema de Ocorrências</h1>
      <p>Faça login para acessar o painel.</p>
      <form id="loginForm" class="form">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" autocomplete="username" required>

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>

        <label for="empresa">Unidade escolar</label>
        <select id="empresa" name="empresa_id" required>
          <option value="">Selecione sua unidade escolar</option>
        </select>

        <button type="submit" class="btn btn-primary">Entrar</button>
        <div class="form-footer">
          <a class="link-button" href="/frontend/pages/createUser.html">Criar novo usuário</a>
        </div>
      </form>
      <div id="loginMessage" class="message"></div>
    </div>
  </div>
  <script src="/frontend/js/app.js"></script>
</body>
</html>
